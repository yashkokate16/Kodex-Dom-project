    <div class="card">
        <h1>wallpapers gallery</h1>

    <div class="icons">
        <div>
     <i class="ri-skip-left-line prev"></i>
     <i class="ri-play-large-line play"></i>

     </div>
     <div>
         <input type="range" name="" id="progress-bar" value="0">
